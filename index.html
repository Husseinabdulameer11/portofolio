<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container">
            <a class="navbar-brand" href="#">My Portfolio</a>
            <button class="btn btn-outline-success" id="theme-toggle">Dark Mode</button>
        </div>
    </nav>
    
    <header class="text-center py-5">
        <img src="profile.jpg" alt="Profile Picture" class="rounded-circle" width="150">
        <h1 class="mt-3">Your Name</h1>
        <p>Short introduction about yourself.</p>
    </header>
    
    <section class="container my-5" id="about">
        <h2>About Me</h2>
        <p>Brief about me description.</p>
    </section>
    
    <section class="container my-5" id="education">
        <h2>Education & Licenses</h2>
        <ul>
            <li>Degree / Certification - Institution</li>
            <li>License - Issuer</li>
        </ul>
    </section>
    
    <section class="container my-5" id="skills">
        <h2>Skills</h2>
        <ul>
            <li>Skill 1</li>
            <li>Skill 2</li>
            <li>Skill 3</li>
        </ul>
    </section>
    
    <section class="container my-5" id="repositories">
        <h2>GitHub Repositories</h2>
        <div id="repo-list" class="row"></div>
    </section>
    
    <footer class="text-center py-4">&copy; 2025 Your Name</footer>
    
    <script src="script.js"></script>
</body>
</html>
